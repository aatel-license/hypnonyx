services:
  # Redis con persistenza
  redis:
    image: redis:alpine
    container_name: devagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # MQTT Broker (Mosquitto)
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: devagent-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
    restart: always

  # Kafka (KRaft mode) con persistenza
  kafka:
    image: apache/kafka:latest
    container_name: devagent-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      # Specifica dove salvare i log/dati internamente
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: always

# OpenSearch
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: devagent-opensearch
    environment:
      - cluster.name=devagent-cluster
      - node.name=devagent-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - plugins.security.disabled=true   # ✅ Questo è il modo corretto per disabilitare il security plugin
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  # OpenSearch Dashboards
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: devagent-dashboards
    ports:
      - "5601:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true  # ✅ Equivalente per i Dashboards
    depends_on:
      opensearch:
        condition: service_healthy
    restart: always

  # Fluent Bit
  fluent-bit:
    image: fluent/fluent-bit:4.2.2
    container_name: devagent-fluent-bit
    environment:
      - OPENSEARCH_USER=${OPENSEARCH_USER}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
    volumes:
      - ./logging/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
      - ./logging/parsers.conf:/fluent-bit/etc/parsers.conf
      - ./memory:/app/memory:ro
    depends_on:
      opensearch:
        condition: service_healthy
    restart: always



volumes:
  redis_data:
  mosquitto_data:
  kafka_data:
  opensearch_data: